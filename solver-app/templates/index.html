<!DOCTYPE html>
<html>
<head>
    <title>hCaptcha Solver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
    <h2>hCaptchaを解いてください</h2>
    <div class="h-captcha" 
         data-sitekey="{{ sitekey }}" 
         data-rqdata="{{ rqdata }}"
         data-callback="onSolved"></div>

    <script>
      function onSolved(token) {
        fetch('/submit', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({id: "{{ session_id }}", token: token})
        }).then(() => {
          document.body.innerHTML = "<h3>解決しました</h3>";
        });
      }
    </script>
</body>
</html>
